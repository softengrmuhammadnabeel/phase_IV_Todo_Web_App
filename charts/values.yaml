# Default values for todoBot
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Top-level service for Helm tests or templates

service:
  port: 8000

global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

# Backend service configuration
backend:
  replicaCount: 1
  image:
    repository: full-todo-backend
    tag: "latest"
    pullPolicy: Never
  service:
    type: NodePort
    port: 8000
  autoscaling:
    enabled: false
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  env:
    - name: PORT
      value: "8000"
    - name: DATABASE_URL
      value: "sqlite:///./app.db"
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5

# Frontend service configuration
frontend:
  replicaCount: 1
  image:
    repository: full-todo-frontend
    tag: "latest"
    pullPolicy: Never
  service:
    type: NodePort
    port: 3000
  autoscaling:
    enabled: false
  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  env:
    - name: PORT
      value: "3000"
    - name: NEXT_PUBLIC_API_BASE_URL
      value: "http://todo-backend:8000"
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 15
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5

# Ingress configuration
ingress:
  enabled: true
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: todo-frontend
              port:
                number: 3000
        - path: /api
          pathType: Prefix
          backend:
            service:
              name: todo-backend
              port:
                number: 8000
  tls: []

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod security context
podSecurityContext:
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

# Node selection
nodeSelector: {}
tolerations: []
affinity: {}

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80

# HTTPRoute (Gateway API)
httpRoute:
  enabled: false