{{- if .Values.backend.enabled | default true }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "todoBot.fullname" . }}-backend
  labels:
    {{- include "todoBot.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "todoBot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
{{- end }}

{{- if .Values.frontend.enabled | default true }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "todoBot.fullname" . }}-frontend
  labels:
    {{- include "todoBot.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "todoBot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
{{- end }}