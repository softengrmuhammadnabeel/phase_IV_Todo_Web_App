apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "todoBot.fullname" . }}-config
  labels:
    {{- include "todoBot.labels" . | nindent 4 }}
data:
  # Configuration for local development
  NEXT_PUBLIC_API_BASE_URL: "http://{{ include "todoBot.fullname" . }}-backend:{{ .Values.backend.service.port }}"
  DATABASE_URL: "sqlite:///./app.db"
  PORT: "8000"